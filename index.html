<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゆりかのぷんぷんゲーム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');

  :root {
    --pink: #FF6B9D;
    --deep-pink: #C41E5B;
    --light-pink: #FFD6E7;
    --cream: #FFF5F8;
    --accent: #FF3366;
    --yellow: #FFE566;
    --text: #3D1A2E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* 背景のハート */
  .bg-hearts {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .bg-heart {
    position: absolute;
    font-size: 1.5rem;
    opacity: 0.08;
    animation: floatHeart linear infinite;
  }

  @keyframes floatHeart {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.08; }
    90% { opacity: 0.08; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  .game-wrap {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 20px;
    max-width: 480px;
    width: 100%;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--deep-pink);
    text-align: center;
    letter-spacing: 0.05em;
  }

  /* キャラクターエリア */
  .char-area {
    position: relative;
    width: 240px;
    height: 240px;
  }

  .yurika {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
    transition: filter 0.5s, transform 0.1s;
    user-select: none;
  }

  .yurika img {
    width: 200px;
    height: 200px;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid var(--pink);
    box-shadow: 0 8px 24px rgba(196,30,91,0.35);
    transition: filter 0.5s, border-color 0.5s, box-shadow 0.5s;
  }

  /* 感情に応じたフィルター */
  .yurika.state-angry img {
    filter: saturate(1.8) hue-rotate(-10deg) brightness(0.95);
    border-color: var(--accent);
    box-shadow: 0 0 0 6px rgba(255,51,102,0.3), 0 8px 24px rgba(196,30,91,0.5);
  }
  .yurika.state-dere img {
    filter: saturate(0.9) brightness(1.08) sepia(0.15);
    border-color: #A8EDEA;
    box-shadow: 0 0 0 6px rgba(168,237,234,0.4), 0 8px 24px rgba(168,237,234,0.5);
  }
  .yurika.state-normal img {
    filter: none;
    border-color: var(--pink);
    box-shadow: 0 8px 24px rgba(196,30,91,0.35);
  }

  .yurika.shake {
    animation: shake 0.5s;
  }
  .yurika.bounce {
    animation: bounce 0.4s;
  }
  .yurika.spin {
    animation: spin 0.6s;
  }

  @keyframes shake {
    0%,100% { transform: rotate(0deg); }
    20% { transform: rotate(-15deg) scale(1.1); }
    40% { transform: rotate(15deg) scale(1.2); }
    60% { transform: rotate(-10deg) scale(1.1); }
    80% { transform: rotate(10deg) scale(1.15); }
  }

  @keyframes bounce {
    0%,100% { transform: translateY(0) scale(1); }
    30% { transform: translateY(-30px) scale(1.2); }
    60% { transform: translateY(-10px) scale(1.05); }
  }

  @keyframes spin {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.3); }
    100% { transform: rotate(360deg) scale(1); }
  }

  /* 怒りゲージ */
  .meter-wrap {
    width: 100%;
    background: white;
    border-radius: 50px;
    border: 3px solid var(--pink);
    height: 32px;
    overflow: hidden;
    box-shadow: 0 4px 12px rgba(255,107,157,0.3);
    position: relative;
  }
  .meter-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--yellow), var(--pink), var(--deep-pink));
    border-radius: 50px;
    transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    min-width: 8px;
  }
  .meter-fill::after {
    content: '';
    position: absolute;
    top: 4px;
    left: 8px;
    right: 8px;
    height: 8px;
    background: rgba(255,255,255,0.4);
    border-radius: 10px;
  }
  .meter-label {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--deep-pink);
    text-align: center;
    margin-top: 4px;
    letter-spacing: 0.1em;
  }

  /* セリフ吹き出し */
  .speech {
    background: white;
    border: 3px solid var(--pink);
    border-radius: 20px;
    padding: 16px 20px;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    position: relative;
    box-shadow: 4px 4px 0 var(--light-pink);
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.6;
    width: 100%;
  }
  .speech::before {
    content: '';
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    border: 10px solid transparent;
    border-bottom-color: var(--pink);
  }
  .speech::after {
    content: '';
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
    border-bottom-color: white;
  }

  /* ボタン */
  .btn-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
  }

  .btn {
    padding: 14px 8px;
    border: none;
    border-radius: 16px;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 0.85rem;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    letter-spacing: 0.02em;
    line-height: 1.4;
  }
  .btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.15);
  }

  .btn-poke  { background: #FF6B9D; color: white; }
  .btn-tease { background: #FF9DE2; color: var(--text); }
  .btn-compliment { background: #A8EDEA; color: var(--text); }
  .btn-gift  { background: var(--yellow); color: var(--text); }

  /* ポップアップ感情 */
  .emoji-pop {
    position: fixed;
    font-size: 2rem;
    pointer-events: none;
    animation: popUp 1s forwards;
    z-index: 100;
  }
  @keyframes popUp {
    0% { transform: translate(-50%,-50%) scale(0) rotate(-20deg); opacity: 1; }
    40% { transform: translate(-50%,-80%) scale(1.4) rotate(10deg); opacity: 1; }
    100% { transform: translate(-50%,-160%) scale(0.8) rotate(0deg); opacity: 0; }
  }

  /* ツンデレメーター */
  .tsundere-bar {
    display: flex;
    width: 100%;
    height: 24px;
    border-radius: 50px;
    overflow: hidden;
    border: 3px solid var(--text);
    font-size: 0.6rem;
  }
  .tsun-side {
    background: var(--pink);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 900;
    transition: flex 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    font-size: 0.65rem;
    letter-spacing: 0.05em;
  }
  .dere-side {
    background: #B8F0A0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    font-weight: 900;
    transition: flex 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    font-size: 0.65rem;
    letter-spacing: 0.05em;
  }

  /* レベル表示 */
  .level-badge {
    background: var(--deep-pink);
    color: white;
    font-weight: 900;
    font-size: 0.75rem;
    padding: 4px 14px;
    border-radius: 50px;
    letter-spacing: 0.1em;
  }

  /* ゲームオーバー / ハッピーエンド */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,107,157,0.92);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .overlay.show {
    opacity: 1;
    pointer-events: all;
  }
  .overlay h2 {
    font-size: 2.5rem;
    font-weight: 900;
    color: white;
    text-shadow: 3px 3px 0 var(--deep-pink);
    text-align: center;
  }
  .overlay p {
    font-size: 1.1rem;
    color: white;
    font-weight: 700;
    text-align: center;
    max-width: 280px;
    line-height: 1.6;
  }
  .overlay .big-emoji { font-size: 5rem; }
  .restart-btn {
    background: white;
    color: var(--deep-pink);
    border: none;
    padding: 14px 32px;
    border-radius: 50px;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--deep-pink);
    transition: all 0.15s;
  }
  .restart-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--deep-pink); }
</style>
</head>
<body>

<!-- 背景ハート -->
<div class="bg-hearts" id="bgHearts"></div>

<div class="game-wrap">
  <div style="display:flex;align-items:center;gap:10px;">
    <h1>💢 ゆりかのぷんぷんゲーム 💢</h1>
  </div>

  <span class="level-badge" id="levelBadge">LEVEL 1 ・ ツンツン中</span>

  <div class="char-area">
    <div class="yurika state-normal" id="yurika">
      <img src="yurika-angry.jpg" alt="ゆりか" id="yurikaImg">
      <video id="yurikaVideo" src="yurika-smile.mp4" loop muted playsinline style="width:200px;height:200px;object-fit:cover;border-radius:50%;border:4px solid #A8EDEA;box-shadow:0 0 0 6px rgba(168,237,234,0.4),0 8px 24px rgba(168,237,234,0.5);display:none;"></video>
    </div>
  </div>

  <div style="width:100%">
    <div class="meter-wrap"><div class="meter-fill" id="angerMeter" style="width:30%"></div></div>
    <div class="meter-label">💢 ぷんぷんゲージ <span id="angerVal">30</span>/100</div>
  </div>

  <div style="width:100%">
    <div class="tsundere-bar">
      <div class="tsun-side" id="tsunSide" style="flex:7">ツン😤</div>
      <div class="dere-side" id="dereSide" style="flex:3">デレ🥰</div>
    </div>
  </div>

  <div class="speech" id="speech">
    べ、別にあなたのことなんて気にしてないんだからね！
  </div>

  <div class="btn-wrap">
    <button class="btn btn-poke"       onclick="action('poke')">👆 つんつんする</button>
    <button class="btn btn-tease"      onclick="action('tease')">😈 からかう</button>
    <button class="btn btn-compliment" onclick="action('compliment')">💐 褒める</button>
    <button class="btn btn-gift"       onclick="action('gift')">🍰 お菓子あげる</button>
  </div>
</div>

<!-- エンドオーバーレイ -->
<div class="overlay" id="overlay">
  <div class="big-emoji" id="endEmoji">💥</div>
  <h2 id="endTitle">ゲームオーバー！</h2>
  <p id="endMsg">ゆりかをぷんぷんさせすぎた…</p>
  <button class="restart-btn" onclick="restart()">もう一回やる</button>
</div>

<script>
  // 背景ハート生成
  const bgHearts = document.getElementById('bgHearts');
  const heartEmojis = ['💕','💗','💓','💢','😤','❤️','💖'];
  for(let i=0;i<18;i++){
    const h = document.createElement('div');
    h.className = 'bg-heart';
    h.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
    h.style.left = Math.random()*100 + '%';
    h.style.animationDuration = (8+Math.random()*12) + 's';
    h.style.animationDelay = (Math.random()*10) + 's';
    h.style.fontSize = (0.8+Math.random()*1.4)+'rem';
    bgHearts.appendChild(h);
  }

  let anger = 30;     // ぷんぷんゲージ 0-100
  let dere = 20;      // デレ度 0-100 (これが上がると心が溶ける)
  let gameOver = false;

  const tsunLines = [
    'な、なに！？ジロジロ見ないでよ！',
    '別にうれしくないし！勘違いしないで！',
    '...フン。どうせ私のことなんてどうでもいいんでしょ。',
    'ちょっと！近づかないでよ、バカ！',
    'あんたなんかに構ってもらわなくていいし！',
    'ほっといてよ！うるさい！',
    'な、なんでそんなことするの！？もう知らない！',
    '（ぷりぷり）...めっっっっっっっちゃムカつく！',
  ];
  const dereLines = [
    '...べ、別に喜んでないから！でも...ありがとっ（小声）',
    'も、もう！そんなこと言われても困るし！...でもちょっとだけ嬉しかった',
    '...やだもう。なんでそんな優しいの（顔赤い）',
    'バ、バカじゃないの！？...ありがとね（ボソッ）',
    'ちょっと！急にそういうことしないでよ...心臓止まるから...',
    'フン...まあ、あなただから特別に許してあげる',
  ];
  const maxAngerLines = [
    'もーーー！！！ゆりかのことバカにしすぎ！！！',
    '絶対許さないんだからね！！！💢💢💢',
    'あーもうムカつく！！！大嫌い！！！（でもすき）',
  ];
  const happyLines = [
    '...もしかして、あなたって...好きかも（小声）',
    'な、なに見てるの！？...って、きてくれてうれしかった（耳まで赤い）',
    '...ずっと一緒にいてもいいよ（絶対聞こえないくらいの小声）',
  ];

  const actions = {
    poke: {
      anger: +12, dere: -5,
      emoji: '👆', anim: 'shake',
      lines: ['ちょっと！つんつんしないで！！', 'や、やめてよ！くすぐったい！', '何するの！！ぷんぷん！']
    },
    tease: {
      anger: +18, dere: -8,
      emoji: '😈', anim: 'shake',
      lines: ['からかわないで！！！', 'バカにしてるの！？もうゆるさない！', 'あんたって本当に最悪！！💢']
    },
    compliment: {
      anger: -10, dere: +15,
      emoji: '💐', anim: 'bounce',
      lines: dereLines
    },
    gift: {
      anger: -8, dere: +20,
      emoji: '🍰', anim: 'bounce',
      lines: ['...べ、別にうれしくないし！でもいただきます（即食べる）', 'こ、これ好きなやつ！...なんで知ってるの（赤面）', 'もらっといてあげる！...ありがと（小声）']
    }
  };

  function getFace() {
    const yurika = document.getElementById('yurika');
    const img    = document.getElementById('yurikaImg');
    const video  = document.getElementById('yurikaVideo');
    yurika.classList.remove('state-angry','state-dere','state-normal');
    if (dere > 65) {
      yurika.classList.add('state-dere');
      img.style.display   = 'none';
      video.style.display = 'block';
      video.play();
    } else {
      video.pause();
      video.currentTime = 0;
      video.style.display = 'none';
      img.style.display   = 'block';
      if (anger > 55) {
        yurika.classList.add('state-angry');
      } else {
        yurika.classList.add('state-normal');
      }
    }
  }

  function updateUI() {
    anger = Math.max(0, Math.min(100, anger));
    dere  = Math.max(0, Math.min(100, dere));

    document.getElementById('angerMeter').style.width = anger + '%';
    document.getElementById('angerVal').textContent = Math.round(anger);
    getFace();

    const tsunFlex = Math.max(1, 10 - Math.round(dere/12));
    const dereFlex = Math.max(1, Math.round(dere/12));
    document.getElementById('tsunSide').style.flex = tsunFlex;
    document.getElementById('dereSide').style.flex = dereFlex;

    // レベル
    let lvText = 'LEVEL 1 ・ ツンツン中';
    if(dere > 70) lvText = 'LEVEL MAX ・ 心が溶けてる🥰';
    else if(dere > 50) lvText = 'LEVEL 4 ・ デレが見えてきた';
    else if(dere > 35) lvText = 'LEVEL 3 ・ ちょっとだけデレ';
    else if(anger > 70) lvText = 'LEVEL 2 ・ かなりぷんぷん💢';
    document.getElementById('levelBadge').textContent = lvText;
  }

  function popEmoji(emoji) {
    const el = document.createElement('div');
    el.className = 'emoji-pop';
    el.textContent = emoji;
    const x = 80 + Math.random() * (window.innerWidth - 160);
    const y = window.innerHeight * 0.4;
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }

  function action(type) {
    if(gameOver) return;
    const a = actions[type];
    anger += a.anger;
    dere  += a.dere;

    // アニメ
    const yurika = document.getElementById('yurika');
    yurika.classList.remove('shake','bounce','spin');
    void yurika.offsetWidth;
    yurika.classList.add(a.anim);
    setTimeout(()=>yurika.classList.remove(a.anim), 700);

    // 絵文字ポップ
    for(let i=0;i<(anger>70?3:1);i++) setTimeout(()=>popEmoji(a.emoji), i*150);

    // セリフ
    let lines;
    if(dere > 65) lines = happyLines;
    else if(anger > 80) lines = maxAngerLines;
    else if(type === 'compliment' || type === 'gift') lines = a.lines;
    else lines = [...tsunLines, ...a.lines];

    document.getElementById('speech').textContent =
      lines[Math.floor(Math.random()*lines.length)];

    updateUI();

    // エンド判定
    if(anger >= 100) {
      setTimeout(()=>showEnd('angry'), 600);
    } else if(dere >= 90) {
      setTimeout(()=>showEnd('happy'), 600);
    }
  }

  function showEnd(type) {
    gameOver = true;
    const ov = document.getElementById('overlay');
    if(type === 'happy') {
      ov.style.background = 'rgba(168,237,234,0.92)';
      document.getElementById('endEmoji').textContent = '🥰';
      document.getElementById('endTitle').textContent = 'ハッピーエンド！！';
      document.getElementById('endMsg').textContent = '「...すき」\nゆりかの心が溶けちゃった！おめでとう！';
    } else {
      ov.style.background = 'rgba(255,107,157,0.92)';
      document.getElementById('endEmoji').textContent = '💢';
      document.getElementById('endTitle').textContent = 'ゲームオーバー！';
      document.getElementById('endMsg').textContent = 'ぷんぷんゲージMAX！\nゆりかに絶縁された…😭';
    }
    ov.classList.add('show');
  }

  function restart() {
    anger = 30; dere = 20; gameOver = false;
    document.getElementById('speech').textContent =
      'べ、別にあなたのことなんて気にしてないんだからね！';
    document.getElementById('overlay').classList.remove('show');
    updateUI();
  }

  updateUI();
</script>
</body>
</html>
